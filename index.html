<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>test discord auth</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px; 
        }
        .btn { 
            background: #5865F2; 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <h1>test logowania</h1>

    <div id="logged-out">
        <button class="btn" onclick="login()">zaloguj przez discord</button>
    </div>

    <div id="logged-in" style="display:none;">
        <h2>dziala :)</h2>
        <p id="user"></p>
        <button class="btn" onclick="logout()">wyloguj</button>
    </div>

    <script>
        const sb = window.supabase.createClient(
            'https://rgkpsalluqhncepieuht.supabase.co', 
            'sb_publishable_UVLQNk4RSTuFZsjTJilDeA_M62'
        );

        async function login() {
            await sb.auth.signInWithOAuth({ 
                provider: 'discord',
                options: { 
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
        }

        async function logout() {
            await sb.auth.signOut();
            location.reload();
        }

        window.onload = async () => {
            // 🔥 Supabase sam pobiera session z #access_token
            const { data, error } = await sb.auth.getSession();

            console.log("SESSION:", data, error);

            if (data.session) {
                document.getElementById('logged-out').style.display = 'none';
                document.getElementById('logged-in').style.display = 'block';

                document.getElementById('user').innerText =
                    "zalogowany jako: " + data.session.user.user_metadata.full_name;

                // 🔥 czyści URL z tokena
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };
    </script>

</body>
</html>
