<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMPK Drobin - Panel Kierowcy</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --accent: #a31d23; 
            --yellow: #f4c430; 
            --text: #ffffff;
            --text-dim: #777;
            --border: #222222;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }

        /* MODALE */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
        }
        .v-modal {
            background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border);
            width: 350px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        .v-modal h3 { color: var(--yellow); margin-top: 0; }
        .v-modal p { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; }
        
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-yes { background: var(--accent); color: white; }
        .btn-no { background: #333; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        /* KALENDARZ */
        .calendar-container { background: var(--card-bg); width: 90%; max-width: 900px; padding: 25px; border-radius: 15px; position: relative; }
        .fc { color: #fff; background: #161616; padding: 10px; border-radius: 8px; border: 1px solid var(--border); max-height: 70vh; }
        .fc-toolbar-title { color: var(--yellow) !important; font-size: 1.1em !important; text-transform: uppercase; }
        .fc-button-primary { background-color: var(--accent) !important; border: none !important; }
        .fc-event { background-color: var(--accent) !important; border: none !important; font-size: 11px; cursor: help; }

        /* UI PANELU */
        #login-page { display: flex; align-items: center; justify-content: center; height: 100vh; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), url('https://i.imgur.com/jLWmK8I.jpeg'); background-size: cover; background-position: center; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--border); width: 320px; text-align: center; }
        
        /* Styl dla LOGO w logowaniu */
        .login-logo { width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(163, 29, 35, 0.3)); }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 12px; background: #080808; border: 1px solid var(--border); border-radius: 6px; color: #fff; outline: none; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        #dashboard { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        aside { background: var(--card-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        
        /* Styl dla LOGO w sidebarze */
        .nav-logo { width: 140px; margin-bottom: 40px; align-self: center; }

        nav ul { list-style: none; padding: 0; }
        nav li { padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; gap: 15px; }
        nav li.active { border-left: 4px solid var(--accent); color: #fff; background: #1a1a1a; }
        main { padding: 40px; overflow-y: auto; background: #0e0e0e; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card p { margin: 12px 0 0; font-size: 30px; font-weight: bold; color: var(--yellow); }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="calendar-modal" class="modal-overlay">
        <div class="calendar-container">
            <span style="position:absolute; right:20px; top:15px; cursor:pointer;" onclick="closeAll()"><i class="fa-solid fa-xmark"></i></span>
            <div id="calendar"></div>
        </div>
    </div>

    <div id="pref-modal" class="modal-overlay">
        <div class="v-modal">
            <h3 style="color:var(--yellow)">Potwierdź służbę</h3>
            <p id="date-label" style="color:#fff; font-weight: bold; margin-bottom: 5px;"></p>
            <p id="slots-info" style="color: var(--accent); font-weight: bold; font-size: 12px; margin-bottom: 15px;"></p>
            <p>Wpisz jaki autobus preferujesz na ten dzień.</p>
            <div class="input-group">
                <input type="text" id="pref-input" placeholder="np. Solaris Urbino 12" style="text-align: center;">
            </div>
            <div class="modal-btns">
                <button id="submit-btn" class="btn btn-yes" onclick="submitService()">Zatwierdź</button>
                <button class="btn btn-no" onclick="closeAll()">Cofnij</button>
            </div>
        </div>
    </div>

    <section id="login-page">
        <div class="login-box">
            <img src="logo.png" alt="VMPK Logo" class="login-logo">
            <div class="input-group">
                <label>użytkownik</label>
                <input type="text" id="username" placeholder="wpisz login...">
            </div>
            <div class="input-group">
                <label>hasło</label>
                <input type="password" id="password" placeholder="••••">
            </div>
            <button class="login-btn" onclick="handleLogin()">zaloguj</button>
        </div>
    </section>

    <div id="dashboard">
        <aside>
            <img src="logo.png" alt="VMPK Logo" class="nav-logo">
            <nav>
                <ul>
                    <li class="active"><i class="fa-solid fa-gauge-high"></i> Strona Główna</li>
                    <li onclick="location.reload()" style="color:var(--yellow)"><i class="fa-solid fa-right-from-bracket"></i> Wyloguj</li>
                </ul>
            </nav>
            <div class="user-status">Zalogowany: <br> <b id="display-user" style="color:var(--yellow);">--</b></div>
        </aside>

        <main>
            <h1>Panel Kierowcy vMPK Drobin</h1>
            <div class="stats-grid">
                <div class="stat-card"><h3>Twoje Kilometry</h3><p id="user-km">0.0 km</p></div>
                <div class="stat-card"><h3>Suma Firmy</h3><p id="total-km">0.0 km</p></div>
            </div>
            <button class="btn-add" onclick="openCalendar()"><i class="fa-solid fa-calendar-plus"></i> Wnioskuj o służbę</button>
            <h2 style="margin-top:40px; font-size:16px; color:var(--text-dim);">Ranking Kierowców</h2>
            <table class="ranking-table" style="width:100%; border-collapse: collapse; margin-top:20px;">
                <thead><tr style="text-align:left; color:var(--text-dim); font-size:11px;"><th>KIEROWCA</th><th>KILOMETRY</th></tr></thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </main>
    </div>

    <script>
        // --- KONFIGURACJA SUPABASE ---
        // WKLEJ TUTAJ SWÓJ KLUCZ ANON KTÓRY SKOPIOWAŁEŚ Z PANELU
        const sb = window.supabase.createClient(
            'https://rgkpsalluqhncepieuht.supabase.co', 
            'TWOJ_SKOPIOWANY_KLUCZ_ANON' 
        );

        // --- BAZA UŻYTKOWNIKÓW (TU MOŻESZ DODAĆ 15 I WIĘCEJ) ---
        const USERS = [
            { user: "pawdan", pass: "admin123" },
            { user: "oloszz", pass: "drobin2026" },
            { user: "kierowca2", pass: "vmpk1" },
            { user: "1234", pass: "1234" },
            { user: "szeryf", pass: "pass789" },
            // Tutaj dopisuj kolejnych mordo...
        ];

        const DISCORD_WEBHOOK = "TU_WKLEJ_SWOJ_WEBHOOK"; 

        let currentUser = "";
        let calendar;
        let selectedDate = "";

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const foundUser = USERS.find(item => item.user === u && item.pass === p);

            if(foundUser) {
                currentUser = foundUser.user;
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                document.getElementById('display-user').innerText = currentUser;
                initCalendar();
                refreshData();
            } else {
                alert("Błędny login lub hasło, mordo!");
            }
        }

        async function initCalendar() {
            const { data: reservations, error } = await sb.from('sluzby').select('*');
            
            if(error) {
                console.error("Błąd kalendarza:", error.message);
            }

            const events = reservations ? reservations.map(r => ({
                title: `${r.kierowca} (${r.pojazd})`,
                start: r.data
            })) : [];

            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                locale: 'pl',
                firstDay: 1,
                events: events,
                dateClick: async function(info) {
                    selectedDate = info.dateStr;
                    document.getElementById('date-label').innerText = "Wybrany dzień: " + selectedDate;
                    
                    const { data: countData } = await sb.from('sluzby').select('id').eq('data', selectedDate);
                    const currentCount = countData ? countData.length : 0;
                    const slotsInfo = document.getElementById('slots-info');
                    const btn = document.getElementById('submit-btn');

                    slotsInfo.innerText = `Zajęte: ${currentCount} / 5 miejsc`;

                    if(currentCount >= 5) {
                        btn.disabled = true;
                        btn.style.opacity = "0.4";
                        btn.innerText = "Brak miejsc";
                    } else {
                        btn.disabled = false;
                        btn.style.opacity = "1";
                        btn.innerText = "Zatwierdź";
                    }

                    document.getElementById('pref-modal').style.display = 'flex';
                }
            });
            calendar.render();
        }

        function openCalendar() { 
            document.getElementById('calendar-modal').style.display = 'flex'; 
            setTimeout(() => calendar.render(), 100); 
        }

        function closeAll() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        async function submitService() {
            const pref = document.getElementById('pref-input').value;
            
            const { data: checkData } = await sb.from('sluzby').select('id').eq('data', selectedDate);
            if(checkData && checkData.length >= 5) {
                alert("Mordo, limit 5 osób na dzień wyczerpany!");
                return;
            }

            const { error } = await sb.from('sluzby').insert([{ 
                kierowca: currentUser, 
                data: selectedDate,
                pojazd: pref || "Brak"
            }]);
            
            if(!error) {
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: "🆕 Nowy wniosek o służbę!",
                            color: 16776960,
                            fields: [
                                { name: "👤 Kierowca", value: currentUser, inline: true },
                                { name: "📅 Data", value: selectedDate, inline: true },
                                { name: "🚌 Pojazd", value: pref || "Brak preferencji" }
                            ]
                        }]
                    })
                });

                alert("Służba zaklepana!");
                location.reload(); 
            } else {
                alert("Błąd bazy: " + error.message + ". Sprawdź czy ustawiłeś RLS!");
            }
        }

        async function refreshData() {
            const { data } = await sb.from('stats').select('*');
            if(data) {
                let uSum = 0, tSum = 0;
                const r = {};
                data.forEach(row => {
                    tSum += row.kilometers;
                    if(row.username === currentUser) uSum += row.kilometers;
                    r[row.username] = (r[row.username] || 0) + row.kilometers;
                });
                document.getElementById('user-km').innerText = uSum.toFixed(1) + " km";
                document.getElementById('total-km').innerText = tSum.toFixed(1) + " km";
                const sorted = Object.entries(r).sort((a,b) => b[1] - a[1]);
                document.getElementById('ranking-body').innerHTML = sorted.map(([n, k], i) => 
                    `<tr style="border-bottom: 1px solid var(--border); height: 50px;"><td>${n} ${i===0?'<i class="fa-solid fa-crown" style="color:#f4c430"></i>':''}</td><td><b>${k.toFixed(1)} km</b></td></tr>`
                ).join('');
            }
        }
    </script>
</body>
</html>
