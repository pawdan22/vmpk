<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMPK Drobin - Panel Kierowcy</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --accent: #a31d23; 
            --yellow: #f4c430; 
            --green: #2ecc71;
            --text: #ffffff;
            --text-dim: #777;
            --border: #222222;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
        }
        .v-modal {
            background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border);
            width: 400px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }
        
        .calendar-container { background: var(--card-bg); width: 90%; max-width: 900px; padding: 25px; border-radius: 15px; position: relative; }
        .fc { color: #fff; background: #161616; padding: 10px; border-radius: 8px; border: 1px solid var(--border); max-height: 70vh; }

        #login-page { display: flex; align-items: center; justify-content: center; height: 100vh; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), url('https://i.imgur.com/jLWmK8I.jpeg'); background-size: cover; background-position: center; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--border); width: 320px; text-align: center; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; background: #080808; border: 1px solid var(--border); border-radius: 6px; color: #fff; outline: none; box-sizing: border-box; }
        
        .btn { padding: 12px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; font-size: 14px; }
        .btn-accent { background: var(--accent); }
        .btn-yellow { background: var(--yellow); color: #000; }
        .btn-green { background: var(--green); color: #fff; }

        #dashboard { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        aside { background: var(--card-bg); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .nav-logo { width: 140px; margin-bottom: 40px; align-self: center; }

        nav ul { list-style: none; padding: 0; flex-grow: 1; }
        nav li { padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; color: var(--text-dim); display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        nav li:hover { background: #1a1a1a; color: #fff; }
        nav li.active { border-left: 4px solid var(--accent); color: #fff; background: #1a1a1a; }
        
        main { padding: 40px; overflow-y: auto; background: #0e0e0e; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .today-duty-card { background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%); border: 1px solid var(--yellow); padding: 25px; border-radius: 15px; margin-bottom: 30px; display: none; }
        .timer-box { color: var(--yellow); font-family: monospace; font-size: 18px; margin-top: 10px; font-weight: bold; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card p { margin: 12px 0 0; font-size: 30px; font-weight: bold; color: var(--yellow); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: var(--text-dim); font-size: 11px; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        .admin-only { display: none; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-pending { background: #555; }
        .badge-active { background: var(--green); }
    </style>
</head>
<body>

    <div id="calendar-modal" class="modal-overlay"><div class="calendar-container"><span style="position:absolute; right:20px; top:15px; cursor:pointer;" onclick="closeAll()"><i class="fa-solid fa-xmark"></i></span><div id="calendar"></div></div></div>
    <div id="pref-modal" class="modal-overlay">
        <div class="v-modal">
            <h3 style="color:var(--yellow)">Wnioskuj o służbę</h3>
            <p id="date-label" style="font-weight: bold;"></p>
            <div class="input-group"><label>Preferowany autobus</label><input type="text" id="pref-input" placeholder="np. Solaris Urbino 12"></div>
            <div style="display:flex; gap:10px; justify-content: center;"><button class="btn btn-accent" onclick="submitService()">Wyślij</button><button class="btn" style="background:#333" onclick="closeAll()">Cofnij</button></div>
        </div>
    </div>

    <section id="login-page">
        <div class="login-box">
            <img src="logo.png" alt="VMPK Logo" style="width:180px; margin-bottom:20px;">
            <div class="input-group"><label>użytkownik</label><input type="text" id="username"></div>
            <div class="input-group"><label>hasło</label><input type="password" id="password"></div>
            <button class="btn btn-accent" style="width:100%; justify-content: center;" onclick="handleLogin()">zaloguj</button>
        </div>
    </section>

    <div id="dashboard">
        <aside>
            <img src="logo.png" alt="VMPK Logo" class="nav-logo">
            <nav>
                <ul>
                    <li onclick="switchView('home')" id="nav-home" class="active"><i class="fa-solid fa-gauge-high"></i> Strona Główna</li>
                    <li onclick="switchView('reports')" id="nav-reports"><i class="fa-solid fa-file-export"></i> Raporty</li>
                    <li onclick="switchView('admin')" id="nav-admin" class="admin-only"><i class="fa-solid fa-user-shield"></i> Zarządzanie</li>
                    <li onclick="location.reload()" style="color:var(--yellow)"><i class="fa-solid fa-right-from-bracket"></i> Wyloguj</li>
                </ul>
            </nav>
            <div class="user-status">Kierowca: <b id="display-user" style="color:var(--yellow);">--</b></div>
        </aside>

        <main>
            <div id="view-home" class="view-section active">
                <h1>Witaj w vMPK Drobin</h1>
                
                <div id="today-duty" class="today-duty-card">
                    <h3 style="margin:0; color:var(--yellow); font-size:12px; text-transform:uppercase;">Aktywna Służba:</h3>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                        <div>
                            <span id="duty-info" style="font-size: 20px; font-weight: bold;">--</span><br>
                            <div class="timer-box" id="duty-timer">Pozostały czas: --:--:--</div>
                        </div>
                        <button class="btn btn-green" onclick="switchView('reports')">ZŁÓŻ RAPORT</button>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><h3>Twoje KM</h3><p id="user-km">0.0 km</p></div>
                    <div class="stat-card"><h3>Suma Firmy</h3><p id="total-km">0.0 km</p></div>
                </div>
                <button class="btn btn-accent" onclick="openCalendar()"><i class="fa-solid fa-calendar-plus"></i> Wnioskuj o służbę</button>

                <h2 style="margin-top:40px; font-size:16px; color:var(--text-dim);">Ranking</h2>
                <table id="ranking-table"><thead><tr><th>KIEROWCA</th><th>KM</th></tr></thead><tbody id="ranking-body"></tbody></table>
            </div>

            <div id="view-reports" class="view-section">
                <h1>Składanie raportu</h1>
                <div style="max-width: 600px; background: var(--card-bg); padding: 30px; border-radius: 12px; border:1px solid var(--border)">
                    <div class="input-group">
                        <label>Wybierz służbę do zdania</label>
                        <select id="report-service-select"><option>Brak aktywnych służb</option></select>
                    </div>
                    <div class="input-group">
                        <label>Liczba przejechanych kilometrów</label>
                        <input type="number" id="report-km" step="0.1" placeholder="0.0">
                    </div>
                    <div class="input-group">
                        <label>Linki do screenów (np. Imgur)</label>
                        <textarea id="report-screens" rows="4" placeholder="Wklej linki do zdjęć z pętli..."></textarea>
                    </div>
                    <button class="btn btn-green" onclick="submitReport()">Wyślij raport</button>
                </div>
            </div>

            <div id="view-admin" class="view-section">
                <h1>Panel Zarządzania</h1>
                <table>
                    <thead><tr><th>DATA</th><th>KIEROWCA</th><th>POJAZD</th><th>LINIA</th><th>AKCJA</th></tr></thead>
                    <tbody id="admin-requests-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const sb = window.supabase.createClient('https://rgkpsalluqhncepieuht.supabase.co', 'sb_publishable_UVLQNk4RSTuFZsjTJilDeA_M62vfl5Q');
        const USERS = [
            { user: "pawdan", pass: "admin123", isAdmin: true },
            { user: "oloszz", pass: "drobin2026", isAdmin: false },
            { user: "1234", pass: "1234", isAdmin: false }
        ];

        let currentUser = null;
        let calendar;
        let selectedDate = "";
        let timerInterval;

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const found = USERS.find(item => item.user === u && item.pass === p);
            if(found) {
                currentUser = found;
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                document.getElementById('display-user').innerText = currentUser.user;
                if(currentUser.isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
                initCalendar(); refreshData(); checkTodayDuty();
            } else alert("Błąd!");
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            document.getElementById('nav-' + view).classList.add('active');
            if(view === 'admin') refreshAdminPanel();
            if(view === 'reports') fillReportsSelect();
        }

        async function initCalendar() {
            const { data } = await sb.from('sluzby').select('*');
            const events = data ? data.map(r => ({ title: `${r.kierowca} [${r.linia || '?'}]`, start: r.data, color: r.status === 'zatwierdzona' ? '#2ecc71' : '#a31d23' })) : [];
            if(calendar) calendar.destroy();
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'pl', firstDay: 1, events: events,
                dateClick: (info) => { selectedDate = info.dateStr; document.getElementById('date-label').innerText = "Data: " + selectedDate; document.getElementById('pref-modal').style.display = 'flex'; }
            });
            calendar.render();
        }

        function openCalendar() { document.getElementById('calendar-modal').style.display = 'flex'; setTimeout(() => calendar.render(), 100); }
        function closeAll() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        async function submitService() {
            await sb.from('sluzby').insert([{ kierowca: currentUser.user, data: selectedDate, pojazd: document.getElementById('pref-input').value || "Dowolny", status: 'oczekujący' }]);
            location.reload();
        }

        async function checkTodayDuty() {
            const { data } = await sb.from('sluzby').select('*').eq('kierowca', currentUser.user).eq('status', 'zatwierdzona').order('zatwierdzono_at', {ascending: false}).limit(1);
            if(data && data[0]) {
                const duty = data[0];
                const approvalTime = new Date(duty.zatwierdzono_at).getTime();
                const deadline = approvalTime + (48 * 60 * 60 * 1000);
                
                document.getElementById('today-duty').style.display = 'block';
                document.getElementById('duty-info').innerText = `${duty.linia} | ${duty.pojazd}`;
                
                if(timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    const now = new Date().getTime();
                    const diff = deadline - now;
                    if(diff <= 0) {
                        document.getElementById('duty-timer').innerText = "CZAS MINĄŁ!";
                        clearInterval(timerInterval);
                    } else {
                        const h = Math.floor(diff / (1000 * 60 * 60));
                        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((diff % (1000 * 60)) / 1000);
                        document.getElementById('duty-timer').innerText = `Pozostało: ${h}h ${m}m ${s}s`;
                    }
                }, 1000);
            }
        }

        async function fillReportsSelect() {
            const { data } = await sb.from('sluzby').select('*').eq('kierowca', currentUser.user).eq('status', 'zatwierdzona');
            const select = document.getElementById('report-service-select');
            if(data && data.length > 0) {
                select.innerHTML = data.map(s => `<option value="${s.id}">${s.data} - Linia ${s.linia}</option>`).join('');
            } else {
                select.innerHTML = '<option>Brak służb do rozliczenia</option>';
            }
        }

        async function submitReport() {
            const id = document.getElementById('report-service-select').value;
            const km = parseFloat(document.getElementById('report-km').value);
            const screens = document.getElementById('report-screens').value;
            if(!km || !screens) return alert("Uzupełnij KM i wklej screeny!");

            await sb.from('stats').insert([{ username: currentUser.user, kilometers: km, details: screens }]);
            await sb.from('sluzby').update({ status: 'zakończona' }).eq('id', id);
            alert("Raport wysłany!");
            location.reload();
        }

        async function refreshAdminPanel() {
            const { data } = await sb.from('sluzby').select('*').eq('status', 'oczekujący');
            const tbody = document.getElementById('admin-requests-body');
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.data}</td><td>${r.kierowca}</td><td>${r.pojazd}</td>
                    <td><input type="text" id="line-${r.id}" style="width:50px; padding:5px; background:#000; color:#fff; border:1px solid #444;"></td>
                    <td><button class="btn btn-green" onclick="approveService(${r.id})">OK</button></td>
                </tr>
            `).join('');
        }

        async function approveService(id) {
            const line = document.getElementById(`line-${id}`).value;
            if(!line) return alert("Wpisz linię!");
            await sb.from('sluzby').update({ 
                status: 'zatwierdzona', 
                linia: line, 
                zatwierdzono_at: new Date().toISOString() 
            }).eq('id', id);
            refreshAdminPanel();
        }

        async function refreshData() {
            const { data } = await sb.from('stats').select('*');
            if(data) {
                let uSum = 0, tSum = 0; const r = {};
                data.forEach(row => {
                    tSum += row.kilometers;
                    if(row.username === currentUser.user) uSum += row.kilometers;
                    r[row.username] = (r[row.username] || 0) + row.kilometers;
                });
                document.getElementById('user-km').innerText = uSum.toFixed(1) + " km";
                document.getElementById('total-km').innerText = tSum.toFixed(1) + " km";
                const sorted = Object.entries(r).sort((a,b) => b[1] - a[1]);
                document.getElementById('ranking-body').innerHTML = sorted.map(([n, k]) => `<tr><td>${n}</td><td><b>${k.toFixed(1)} km</b></td></tr>`).join('');
            }
        }
    </script>
</body>
</html>
